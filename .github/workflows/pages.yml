name: Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy the web build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0 # need full history + tags to build /original from v0.40.1
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Build the wasm front-end
        run: |
          mkdir -p _site
          cp web/index.html web/CNAME _site/
          cp -r web/audio _site/
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" _site/
          GOOS=js GOARCH=wasm go build -trimpath -ldflags "-s -w" \
            -o _site/tsl-go.wasm ./cmd/tsl-wasm
          ls -l _site/
      - name: Build the original 0.40.1 at /original
        run: |
          mkdir -p _site/original
          git worktree add "$RUNNER_TEMP/orig" v0.40.1
          GOOS=js GOARCH=wasm go build -C "$RUNNER_TEMP/orig" -trimpath -ldflags "-s -w" \
            -o "$GITHUB_WORKSPACE/_site/original/tsl-go.wasm" ./cmd/tsl-wasm
          cp "$RUNNER_TEMP/orig/web/index.html" _site/original/index.html
          sed -i 's#>source</a>#>source</a>\n  \&middot; <a href="/">play the enhanced version</a>#' _site/original/index.html
          cp "$(go env GOROOT)/misc/wasm/wasm_exec.js" _site/original/
          ls -l _site/original/
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
