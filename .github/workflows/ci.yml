name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt check
        run: test -z "$(gofmt -l cmd internal data)"
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: wasm build check
        run: GOOS=js GOARCH=wasm go build ./cmd/tsl-wasm
