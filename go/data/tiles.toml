# Tile definitions. Each [tile.<id>] table becomes a TileDef keyed by <id>.
# glyph: exactly one character. color: one of normal/brown/blue/red/green/cyan/magenta/black.
[tile.floor]
glyph = "."
color = "normal"
passable = true
transparent = true

[tile.wall]
glyph = "#"
color = "normal"
passable = false
transparent = false

[tile.stairs_down]
glyph = ">"
color = "normal"
passable = true
transparent = true

# The ascension altar in the Chapel — stepping onto it wins the game.
[tile.altar]
glyph = "_"
color = "cyan"
passable = true
transparent = true
win = true

# A dart trap — poisons whoever steps on it (#18).
[tile.dart_trap]
glyph = "^"
color = "red"
passable = true
transparent = true
effect = "poison"
effect_turns = 5
