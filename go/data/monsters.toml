# Monster definitions. [monster.<id>] → MonsterDef keyed by <id>.
# Stats are inspired by the C bestiary (common/monster.c attr_health/attr_speed,
# common/glyph.c glyphs); attack/dodge/damage are assigned by role. Early-tier
# melee only until depth-scaled spawn tables (#16); heavy/special monsters TBD.

