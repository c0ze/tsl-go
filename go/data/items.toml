# Item definitions. [item.<id>] → ItemDef keyed by <id>.
[item.healing_potion]
name = "healing potion"
glyph = "!"
color = "red"
kind = "potion"
use = "heal"
power = 8

[item.dagger]
name = "dagger"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 2
damage = "1d4"

[item.leather_armor]
name = "leather armor"
glyph = "["
color = "brown"
kind = "armor"
dodge = 2

# Melee weapons (better than the starting dagger; found as floor loot).
[item.machete]
name = "machete"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 3
damage = "1d6"

[item.quarterstaff]
name = "quarterstaff"
glyph = ")"
color = "brown"
kind = "weapon"
attack = 2
damage = "1d6"

[item.cleaver]
name = "cleaver"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 3
damage = "1d8"

[item.crystal_sword]
name = "crystal sword"
glyph = ")"
color = "cyan"
kind = "weapon"
attack = 4
damage = "2d4"

[item.doomblade]
name = "doomblade"
glyph = ")"
color = "red"
kind = "weapon"
attack = 5
damage = "2d6"

# Body armor (dodge bonus).
[item.filthy_rags]
name = "filthy rags"
glyph = "["
color = "brown"
kind = "armor"
dodge = 1

[item.fish_scale_armor]
name = "fish-scale armor"
glyph = "["
color = "green"
kind = "armor"
dodge = 3

[item.chainmail]
name = "chainmail"
glyph = "["
color = "normal"
kind = "armor"
dodge = 4

[item.rune_armor]
name = "rune armor"
glyph = "["
color = "magenta"
kind = "armor"
dodge = 5

# Food. Eaten with `e` to restore HP. Corpses are nospawn (drops only).
[item.ration]
name = "ration"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 5

# Generic corpses dropped by monsters (see monsters.toml `corpse = ...`).
[item.corpse]
name = "corpse"
glyph = "%"
color = "normal"
kind = "food"
use = "eat"
power = 2
nospawn = true

[item.carcass]
name = "carcass"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 2
nospawn = true

[item.ratman_corpse]
name = "ratman corpse"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 3
nospawn = true

[item.ghoul_corpse]
name = "ghoul corpse"
glyph = "%"
color = "green"
kind = "food"
use = "eat"
power = 1
nospawn = true

# Status-effect consumables (#15).
[item.potion_regeneration]
name = "potion of regeneration"
glyph = "!"
color = "green"
kind = "potion"
use = "regenerate"
power = 8

[item.red_mushroom]
name = "red mushroom"
glyph = "%"
color = "red"
kind = "food"
use = "eat_mushroom"
power = 4

# Wands (#15) — zap (z) to target a creature; power = charges.
[item.wand_force_bolt]
name = "wand of force bolt"
glyph = "/"
color = "blue"
kind = "wand"
damage = "2d6"
power = 5

# Status-effect wand: no direct hit, but poisons the target so it withers over
# the next several turns (effect/effect_turns mirror a trap tile).
[item.wand_venom]
name = "wand of venom"
glyph = "/"
color = "green"
kind = "wand"
effect = "poison"
effect_turns = 8
power = 5

# Control wand: slows the target so it moves and attacks at half pace — kite it.
[item.wand_slowing]
name = "wand of slowing"
glyph = "/"
color = "cyan"
kind = "wand"
effect = "slow"
effect_turns = 10
power = 5

# Scrolls (#15) — read (r) to invoke. Glyph ?.
[item.scroll_teleport]
name = "scroll of teleportation"
glyph = "?"
color = "magenta"
kind = "scroll"
use = "teleport"

[item.scroll_magic_mapping]
name = "scroll of magic mapping"
glyph = "?"
color = "blue"
kind = "scroll"
use = "reveal"
