# Item definitions. [item.<id>] → ItemDef keyed by <id>.
[item.healing_potion]
name = "healing potion"
glyph = "!"
color = "red"
kind = "potion"
use = "heal"
power = 8

[item.dagger]
name = "dagger"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 2
damage = "1d4"

[item.leather_armor]
name = "leather armor"
glyph = "["
color = "brown"
kind = "armor"
dodge = 2

# Melee weapons (better than the starting dagger; found as floor loot).
[item.machete]
name = "machete"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 3
damage = "1d6"

[item.quarterstaff]
name = "quarterstaff"
glyph = ")"
color = "brown"
kind = "weapon"
attack = 2
damage = "1d6"

[item.cleaver]
name = "cleaver"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 3
damage = "1d8"

[item.crystal_sword]
name = "crystal sword"
glyph = ")"
color = "cyan"
kind = "weapon"
attack = 4
damage = "2d4"

[item.doomblade]
name = "doomblade"
glyph = ")"
color = "red"
kind = "weapon"
attack = 5
damage = "2d6"

# Ranged weapon (#14) — wield it, then fire (f) at a target in line of sight.
# Weak in melee; its strength is reach. power/ammo are infinite for now.
[item.shortbow]
name = "shortbow"
glyph = "}"
color = "brown"
kind = "weapon"
attack = 1
damage = "1d6"
ranged = 6

# Body armor (dodge bonus).
[item.filthy_rags]
name = "filthy rags"
glyph = "["
color = "brown"
kind = "armor"
dodge = 1

[item.fish_scale_armor]
name = "fish-scale armor"
glyph = "["
color = "green"
kind = "armor"
dodge = 3

[item.chainmail]
name = "chainmail"
glyph = "["
color = "normal"
kind = "armor"
dodge = 4

[item.rune_armor]
name = "rune armor"
glyph = "["
color = "magenta"
kind = "armor"
dodge = 5

# Food. Eaten with `e` to restore HP. Corpses are nospawn (drops only).
[item.ration]
name = "ration"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 5

# Generic corpses dropped by monsters (see monsters.toml `corpse = ...`).
[item.corpse]
name = "corpse"
glyph = "%"
color = "normal"
kind = "food"
use = "eat"
power = 2
nospawn = true

[item.carcass]
name = "carcass"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 2
nospawn = true

[item.ratman_corpse]
name = "ratman corpse"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 3
nospawn = true

[item.ghoul_corpse]
name = "ghoul corpse"
glyph = "%"
color = "green"
kind = "food"
use = "eat"
power = 1
nospawn = true

# Consumable breadth (#15h). Potions/scrolls hide behind a random appearance
# until used or identified; a potion of pain gives quaffing-the-unknown real risk.
[item.potion_instant_healing]
name = "potion of instant healing"
glyph = "!"
color = "red"
kind = "potion"
use = "instant_healing"

[item.potion_pain]
name = "potion of pain"
glyph = "!"
color = "red"
kind = "potion"
use = "pain"
power = 8

[item.potion_blindness]
name = "potion of blindness"
glyph = "!"
color = "black"
kind = "potion"
use = "blindness"
power = 12

[item.scroll_identify]
name = "scroll of identify"
glyph = "?"
color = "normal"
kind = "scroll"
use = "identify"

[item.scroll_recharge]
name = "scroll of recharge"
glyph = "?"
color = "cyan"
kind = "scroll"
use = "recharge"

# Status-effect consumables (#15).
[item.potion_regeneration]
name = "potion of regeneration"
glyph = "!"
color = "green"
kind = "potion"
use = "regenerate"
power = 8

[item.red_mushroom]
name = "red mushroom"
glyph = "%"
color = "red"
kind = "food"
use = "eat_mushroom"
power = 4

# Wands (#15) — zap (z) to target a creature; power = charges.
[item.wand_force_bolt]
name = "wand of force bolt"
glyph = "/"
color = "blue"
kind = "wand"
damage = "2d6"
power = 5

# Status-effect wand: no direct hit, but poisons the target so it withers over
# the next several turns (effect/effect_turns mirror a trap tile).
[item.wand_venom]
name = "wand of venom"
glyph = "/"
color = "green"
kind = "wand"
effect = "poison"
effect_turns = 8
power = 5

# Control wand: slows the target so it moves and attacks at half pace — kite it.
[item.wand_slowing]
name = "wand of slowing"
glyph = "/"
color = "cyan"
kind = "wand"
effect = "slow"
effect_turns = 10
power = 5

# Scrolls (#15) — read (r) to invoke. Glyph ?.
[item.scroll_teleport]
name = "scroll of teleportation"
glyph = "?"
color = "magenta"
kind = "scroll"
use = "teleport"

[item.scroll_magic_mapping]
name = "scroll of magic mapping"
glyph = "?"
color = "blue"
kind = "scroll"
use = "reveal"

# Spellbooks (#15i/j) — carry one and press c to cast (costs EP). A book is either
# a utility spell (use = effect) or a targeted attack (ranged + damage).
[item.spellbook_first_aid]
name = "spellbook of first aid"
glyph = "+"
color = "blue"
kind = "spellbook"
use = "first_aid"
cost = 4
power = 8

[item.spellbook_force_bolt]
name = "spellbook of force bolt"
glyph = "+"
color = "red"
kind = "spellbook"
ranged = 6
damage = "2d6"
cost = 5

# Beam spell — frost ray tears through a whole line of creatures.
[item.spellbook_frost_ray]
name = "spellbook of frost ray"
glyph = "+"
color = "cyan"
kind = "spellbook"
beam = true
ranged = 6
damage = "2d4"
cost = 6

# Light source (#18) — carry it to see in the dark (light = sight radius there).
[item.torch]
name = "torch"
glyph = "~"
color = "red"
kind = "light"
light = 6
