# Food. Eaten with `e` to restore HP. Corpses are nospawn (drops only).
[item.ration]
name = "ration"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 5

# Generic corpses dropped by monsters (see monsters.toml `corpse = ...`).
[item.corpse]
name = "corpse"
glyph = "%"
color = "normal"
kind = "food"
use = "eat"
power = 2
nospawn = true
weight = 599

[item.carcass]
name = "carcass"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 2
nospawn = true

[item.ratman_corpse]
name = "ratman corpse"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 3
nospawn = true

[item.ghoul_corpse]
name = "ghoul corpse"
glyph = "%"
color = "green"
kind = "food"
use = "eat"
power = 1
nospawn = true

# Consumable breadth (#15h). Potions/scrolls hide behind a random appearance
# until used or identified; a potion of pain gives quaffing-the-unknown real risk.
[item.potion_instant_healing]
name = "potion of instant healing"
glyph = "!"
color = "red"
kind = "potion"
use = "instant_healing"

[item.potion_pain]
name = "potion of pain"
glyph = "!"
color = "red"
kind = "potion"
use = "pain"
power = 8

[item.potion_blindness]
name = "potion of blindness"
glyph = "!"
color = "black"
kind = "potion"
use = "blindness"
power = 12

# Turn-energy pair (16b): haste/slow on the player, 20 turns each
# (C rules.h HASTE_LENGTH/SLOW_LENGTH); each cancels the other on quaff.
[item.potion_speed]
name = "potion of speed"
glyph = "!"
color = "brown"
kind = "potion"
use = "haste"
power = 20

[item.potion_slowing]
name = "potion of slowing"
glyph = "!"
color = "blue"
kind = "potion"
use = "slowness"
power = 20

# Float potion (18b): 20 turns airborne (C rules.h LEVITATE_TIME) — cross
# water and skip traps, but mind where the clock runs out.
[item.potion_levitation]
name = "potion of levitation"
glyph = "!"
color = "green"
kind = "potion"
use = "levitate"
power = 20

# Knockout potion (16c): 25 lost turns (C rules.h SLEEP_DURATION) unless
# something hits you awake first.
[item.potion_sleep]
name = "potion of sleep"
glyph = "!"
color = "cyan"
kind = "potion"
use = "tranquilize"
power = 25

# Potion of energy — refills spell EP (power = EP restored). Closes the cast loop.
[item.potion_energy]
name = "potion of energy"
glyph = "!"
color = "magenta"
kind = "potion"
use = "restore_energy"
power = 8

[item.scroll_identify]
name = "scroll of identify"
glyph = "?"
color = "normal"
kind = "scroll"
use = "identify"

[item.scroll_recharge]
name = "scroll of recharge"
glyph = "?"
color = "cyan"
kind = "scroll"
use = "recharge"

# Status-effect consumables (#15).
[item.potion_regeneration]
name = "potion of regeneration"
glyph = "!"
color = "green"
kind = "potion"
use = "regenerate"
power = 8

[item.red_mushroom]
name = "red mushroom"
glyph = "%"
color = "red"
kind = "food"
use = "eat_mushroom"
power = 4

# Wands (#15) — zap (z) to target a creature; power = charges.
[item.wand_force_bolt]
name = "wand of force bolt"
glyph = "/"
color = "blue"
kind = "wand"
damage = "2d6"
power = 5

# Status-effect wand: no direct hit, but poisons the target so it withers over
# the next several turns (effect/effect_turns mirror a trap tile).
[item.wand_venom]
name = "wand of venom"
glyph = "/"
color = "green"
kind = "wand"
effect = "poison"
effect_turns = 8
power = 5

# Control wand: slows the target so it moves and attacks at half pace — kite it.
[item.wand_slowing]
name = "wand of slowing"
glyph = "/"
color = "cyan"
kind = "wand"
effect = "slow"
effect_turns = 10
power = 5

# Wand of confusion (#15) — a pure status wand: the target lurches around at
# random and can't press an attack until the confusion wears off (effect_turns).
[item.wand_confusion]
name = "wand of confusion"
glyph = "/"
color = "magenta"
kind = "wand"
effect = "confuse"
effect_turns = 8
power = 5

# Scrolls (#15) — read (r) to invoke. Glyph ?.
[item.scroll_blink]
name = "blink scroll"
glyph = "?"
color = "magenta"
kind = "scroll"
use = "teleport"

[item.scroll_magic_mapping]
name = "scroll of magic mapping"
glyph = "?"
color = "blue"
kind = "scroll"
use = "reveal"

# Scroll of scare monster (#15) — a wave of terror: every nearby creature flees
# the player (fear effect) for `power` turns instead of attacking.
[item.scroll_scare_monster]
name = "scroll of scare monster"
glyph = "?"
color = "red"
kind = "scroll"
use = "scare"
power = 8

# Spellbooks (#15i/j) — carry one and press c to cast (costs EP). A book is either
# a utility spell (use = effect) or a targeted attack (ranged + damage).
[item.spellbook_first_aid]
name = "spellbook of first aid"
glyph = "+"
color = "blue"
kind = "spellbook"
use = "first_aid"
cost = 4
power = 8

# Utility spell — flash blinds the creatures around you (power = blind turns).
[item.spellbook_flash]
name = "spellbook of flash"
glyph = "+"
color = "normal"
kind = "spellbook"
use = "flash"
cost = 5
power = 8

[item.spellbook_force_bolt]
name = "spellbook of force bolt"
glyph = "+"
color = "red"
kind = "spellbook"
ranged = 6
damage = "2d6"
cost = 5

# Beam spell — frost ray tears through a whole line of creatures.
[item.spellbook_frost_ray]
name = "spellbook of frost ray"
glyph = "+"
color = "cyan"
kind = "spellbook"
beam = true
ranged = 6
damage = "2d4"
cost = 6

# Noxious cloud (#15) — a self-centred AoE that poisons nearby creatures, who
# then bleed HP each turn (NoxiousRadius = 3). Area denial, not burst.
[item.spellbook_noxious_cloud]
name = "spellbook of noxious cloud"
glyph = "+"
color = "green"
kind = "spellbook"
use = "noxious_cloud"
cost = 6
power = 6

# Light source (#18) — carry it to see in the dark (light = sight radius there).
[item.torch]
name = "torch"
glyph = "~"
color = "red"
kind = "light"
light = 6

# Accessories (#14) — rings and amulets are passive equip slots, separate from
# weapon and armor, whose attack/dodge bonuses stack onto your hit and defense.
# Faithful to 0.40's worn item_type/equipped model (common/item.h, gent_amulet).
[item.ring_of_accuracy]
name = "ring of accuracy"
glyph = "="
color = "magenta"
kind = "ring"
attack = 2

[item.ring_of_protection]
name = "ring of protection"
glyph = "="
color = "magenta"
kind = "ring"
dodge = 2

[item.amulet_of_warding]
name = "amulet of warding"
glyph = "\""
color = "magenta"
kind = "amulet"
dodge = 3

# The table's dregs (15r): one bottle is pure vile flavor, the other strips
# every status effect, even the ones you wanted (C treasure_p_yuck/elixir).
[item.potion_yuck]
name = "potion of yuck"
glyph = "!"
color = "brown"
kind = "potion"
use = "yuck"

[item.elixir]
name = "elixir"
glyph = "!"
color = "normal"
kind = "potion"
use = "elixir"

# The map-eraser (15t, C magic.c amnesia) — an unlucky unidentified read.
[item.scroll_amnesia]
name = "scroll of amnesia"
glyph = "?"
color = "magenta"
kind = "scroll"
use = "amnesia"

# The teleport-home pair (15u, C teleport.c cast_mark/cast_recall).
[item.scroll_mark]
name = "mark scroll"
glyph = "?"
color = "green"
kind = "scroll"
use = "mark"

[item.scroll_recall]
name = "recall scroll"
glyph = "?"
color = "brown"
kind = "scroll"
use = "recall"

# Scroll 8 of 10 (18d, C magic.c reveal_traps): every needle on the level,
# lit up at once.
[item.scroll_trap_detection]
name = "trap detection scroll"
glyph = "?"
color = "red"
kind = "scroll"
use = "detect_traps"

# Scroll 9 of 10 (15v, C magic.c magic_weapon): 22 turns of flame hands
# (C MAGIC_WEAPON_LIFETIME), superseding whatever you wield.
[item.scroll_magic_weapon]
name = "scroll of magic weapon"
glyph = "?"
color = "cyan"
kind = "scroll"
use = "magic_weapon"
power = 22

# The tenth and last scroll (15w, C magic.c summon_familiar): an imp ally for
# 500 turns (C DEFAULT_SUMMON_LIFETIME). 0.40 capitalizes the name.
[item.scroll_familiar]
name = "scroll of Summon Familiar"
glyph = "?"
color = "normal"
kind = "scroll"
use = "summon_familiar"
power = 500

# Breath spellbooks (19b, C treasure.h's first two books): a cone of your own,
# 5 EP each (C attrs.c). Point it away from the imp.
[item.book_breathe_fire]
name = "book of Breathe Fire"
glyph = "+"
color = "red"
kind = "spellbook"
breath = "fire"
cost = 5

[item.book_noxious_breath]
name = "book of Noxious Breath"
glyph = "+"
color = "green"
kind = "spellbook"
breath = "poison"
cost = 5

# Two more books (15x). The Deathspell is the C's 1-EP coin flip — the target
# dies, or you do; the manual ends potion roulette in one read. The C's
# manual of camouflage is commented out in 0.40, so it is faithfully absent.
[item.book_deathspell]
name = "book of Deathspell"
glyph = "+"
color = "black"
kind = "spellbook"
deathspell = true
cost = 1

[item.manual_pharmacy]
name = "manual of pharmacy"
glyph = "+"
color = "brown"
kind = "spellbook"
use = "pharmacy"
cost = 2

# Ammunition (14a, C treasure.c crude arrows): the shortbow stops firing for
# free. Bundles merge into one quiver; power = arrows per found bundle.
[item.arrow]
name = "crude arrow"
glyph = ":"
color = "brown"
kind = "ammo"
power = 8

# The thirteenth and final potion (22a, C treasure_p_polymorph): any shape in
# the roster, for 85 turns (C SHAPESHIFT_DURATION). The table is complete.
[item.potion_polymorph]
name = "potion of polymorph"
glyph = "!"
color = "normal"
kind = "potion"
use = "polymorph"
power = 85
