# Item definitions. [item.<id>] → ItemDef keyed by <id>.
[item.healing_potion]
name = "healing potion"
glyph = "!"
color = "red"
kind = "potion"
use = "heal"
power = 8

[item.dagger]
name = "dagger"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 2
damage = "1d4"

[item.leather_armor]
name = "leather armor"
glyph = "["
color = "brown"
kind = "armor"
dodge = 2

# Food. Eaten with `e` to restore HP. Corpses are nospawn (drops only).
[item.ration]
name = "ration"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 5

# Generic corpses dropped by monsters (see monsters.toml `corpse = ...`).
[item.corpse]
name = "corpse"
glyph = "%"
color = "normal"
kind = "food"
use = "eat"
power = 2
nospawn = true

[item.carcass]
name = "carcass"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 2
nospawn = true

[item.ratman_corpse]
name = "ratman corpse"
glyph = "%"
color = "brown"
kind = "food"
use = "eat"
power = 3
nospawn = true

[item.ghoul_corpse]
name = "ghoul corpse"
glyph = "%"
color = "green"
kind = "food"
use = "eat"
power = 1
nospawn = true
