# Item definitions. [item.<id>] → ItemDef keyed by <id>.
[item.healing_potion]
name = "healing potion"
glyph = "!"
color = "red"
kind = "potion"
use = "heal"
power = 8

[item.dagger]
name = "dagger"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 2
damage = "1d4"
weight = 18

[item.leather_armor]
name = "leather armor"
glyph = "["
color = "brown"
kind = "armor"
dodge = 2

# Melee weapons (better than the starting dagger; found as floor loot).
[item.machete]
name = "machete"
glyph = ")"
color = "normal"
kind = "weapon"
attack = 3
damage = "1d6"
weight = 18

[item.quarterstaff]
