attack = 5
damage = "2d6"
weight = 28

# Ranged weapon (#14) — wield it, then fire (f) at a target in line of sight.
# Weak in melee; its strength is reach. Each shot spends a crude arrow (14a).
[item.shortbow]
name = "shortbow"
glyph = "}"
color = "brown"
kind = "weapon"
attack = 1
damage = "1d6"
ranged = 6
weight = 20

# Body armor (dodge bonus).
[item.filthy_rags]
name = "filthy rags"
glyph = "["
color = "brown"
kind = "armor"
dodge = 1
weight = 25

[item.fish_scale_armor]
name = "fish-scale armor"
glyph = "["
color = "green"
kind = "armor"
dodge = 3

[item.chainmail]
name = "chainmail"
