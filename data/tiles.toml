# Tile definitions. Each [tile.<id>] table becomes a TileDef keyed by <id>.
# glyph: exactly one character. color: one of normal/brown/blue/red/green/cyan/magenta/black.
[tile.floor]
glyph = "."
color = "normal"
passable = true
transparent = true

[tile.wall]
glyph = "#"
color = "normal"
passable = false
transparent = false

[tile.stairs_down]
glyph = ">"
color = "normal"
passable = true
transparent = true

# The ascension altar in the Chapel — stepping onto it wins the game.
[tile.altar]
glyph = "_"
color = "cyan"
passable = true
transparent = true
win = true

# A dart trap — poisons whoever steps on it (#18).
[tile.dart_trap]
glyph = "^"
color = "red"
passable = true
transparent = true
effect = "poison"
effect_turns = 5

# Doors (#18). A closed door blocks movement and sight; bumping it opens it into
# door_open (passable + transparent). Placed in room doorways on doored levels.
[tile.door_closed]
glyph = "+"
color = "brown"
passable = false
transparent = false
opens_to = "door_open"

[tile.door_open]
glyph = "'"
color = "brown"
passable = true
transparent = true

# Deep water (#18, C tiles.c): impassable on foot — only the blinded stumble in
# (later: levitation floats over) — and each turn spent in it drains the wader.
[tile.water]
glyph = "_"
color = "blue"
passable = false
transparent = true
water = true

# Molten rock (#18e, C tiles.c/elements.c): impassable on foot, burns 1d6+1
# per turn. 0.40 renders lava and every trap as '^'; our colors differ them.
[tile.lava]
glyph = "^"
color = "brown"
passable = false
transparent = true
lava = true

# Trap variants (18f, C traps.c) — the audited #18 remainder, all live in
# 0.40 (flash at encounter weight 12, web at 10; our gen deals uniformly,
# a documented approximation). All spawn hidden like darts.
[tile.web_trap]
glyph = "^"
color = "normal"
passable = true
transparent = true
effect = "web"
effect_turns = 27

[tile.flash_trap]
glyph = "^"
color = "cyan"
passable = true
transparent = true
effect = "blind"
effect_turns = 33

[tile.plate_trap]
glyph = "^"
color = "blue"
passable = true
transparent = true
damage = "1d4+1"

[tile.polymorph_trap]
glyph = "^"
color = "magenta"
passable = true
transparent = true
effect = "polymorph"
effect_turns = 85
